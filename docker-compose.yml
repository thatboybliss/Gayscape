version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gayscape_db
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/gayscape_db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
